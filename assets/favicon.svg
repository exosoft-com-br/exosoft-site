<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E40AF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </radialGradient>
    <linearGradient id="m1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#C8D8F0"/>
      <stop offset="100%" stop-color="#2A5090"/>
    </linearGradient>
    <linearGradient id="m2" x1="1" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#B0C8E8"/>
      <stop offset="100%" stop-color="#1E3A6E"/>
    </linearGradient>
    <filter id="g" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="12" fill="url(#bg)"/>

  <!-- Outer neon ring hint -->
  <circle cx="32" cy="32" r="29" stroke="#38BDF8" stroke-width="0.8" stroke-opacity="0.5" fill="none"/>

  <!-- X shape — top-left arm -->
  <polygon points="10,8 32,6 27,24 8,25" fill="url(#m1)" stroke="#38BDF8" stroke-width="0.8" filter="url(#g)"/>
  <!-- X shape — top-right arm -->
  <polygon points="32,6 54,8 56,25 37,24" fill="url(#m2)" stroke="#38BDF8" stroke-width="0.8" filter="url(#g)"/>
  <!-- X shape — bottom-left arm -->
  <polygon points="8,39 27,40 32,58 10,56" fill="url(#m2)" stroke="#38BDF8" stroke-width="0.8" filter="url(#g)"/>
  <!-- X shape — bottom-right arm -->
  <polygon points="37,40 56,39 54,56 32,58" fill="url(#m1)" stroke="#38BDF8" stroke-width="0.8" filter="url(#g)"/>

  <!-- Center dark hex -->
  <polygon points="27,24 37,24 40,32 37,40 27,40 24,32" fill="#060D1C" stroke="#38BDF8" stroke-width="0.8"/>

  <!-- Center glow -->
  <ellipse cx="32" cy="32" rx="6" ry="6" fill="#38BDF8" fill-opacity="0.15"/>

  <!-- Orange accent arrows -->
  <polygon points="32,8  35,14 32,12 29,14" fill="#FFA040"/>
  <polygon points="32,56 29,50 32,52 35,50" fill="#FFA040"/>
  <polygon points="8,32  14,29 12,32 14,35" fill="#FFA040"/>
  <polygon points="56,32 50,35 52,32 50,29" fill="#FFA040"/>
</svg>
